name: Daily Research Paper Agent

on:
  schedule:
    # Run every day at 7:00 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-agent:
    name: Trigger Daily Paper Screening Agent
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Agent Pipeline
        run: |
          echo "Triggering Research Paper Screening Agent..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.BACKEND_URL }}/agent/run" \
            -H "X-Agent-Secret: ${{ secrets.DAILY_AGENT_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Agent trigger failed with status $RESPONSE"
            exit 1
          fi
          echo "✅ Agent triggered successfully"

      - name: Wait and Check Status
        run: |
          sleep 30
          curl -s "${{ secrets.BACKEND_URL }}/agent/status" | python3 -m json.tool
